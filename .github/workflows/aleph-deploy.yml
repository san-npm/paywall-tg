name: Aleph Cloud Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit SHA to deploy'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ github.event.inputs.commit || github.sha }}

      - name: Deploy to Aleph Instance
        id: deploy
        # When the real instance-deploy implementation lands, mirror the
        # IPFS workflow's stderr-capture pattern: wrap each fallible step
        # with `set -o pipefail` + `2>&1 | tee /tmp/build.log` and add a
        # `Report failure` step that tails the log into a /api/deploy/report
        # call (see generateIpfsWorkflow above).
        run: |
          set -o pipefail
          {
            echo "Instance deployment not yet implemented"
            echo "url=pending" >> $GITHUB_OUTPUT
          } 2>&1 | tee /tmp/build.log
